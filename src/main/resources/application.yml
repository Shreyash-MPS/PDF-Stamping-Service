server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

stamping:
  temp-dir: ${java.io.tmpdir}/pdf-stamping
  default-font-size: 12
  default-font-color: "#000000"
  default-opacity: 0.8

logging:
  pattern:
    console: "%d{HH:mm:ss} %highlight(%-5level) %cyan(%-40.40logger{39}) : %msg%n"
  level:
    root: WARN
    com.stamping: INFO
    com.stamping.service.AdFetchService: DEBUG
    org.springframework.web: WARN
    org.apache.pdfbox: WARN
    com.itextpdf: WARN
